        /* Keep the rest of your styles */
        html, body {
            height: 100%;

            background-color: #000000;
            /* Prevent address bar resize from causing jank */
            overscroll-behavior: none;

        /* Fixed background that ABSOLUTELY won't move or respond to anything */
        .fixed-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100vw;
            height: 100vh;
            /* Lock to initial viewport - won't change with address bar */

            background-attachment: scroll;
            pointer-events: none;
            /* Prevent any transform or reflow */
            transform: translateZ(0);
            will-change: initial;
            backface-visibility: hidden;
        }

        /* Main content container that properly fills the viewport */
        .content-container {
            min-height: -webkit-fill-available;
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 16px;
            padding-bottom: 32px;
            position: relative;
            z-index: 1;
            /* Smooth scrolling */
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* Dimming overlay */
        .bg-dimmer {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100vw;
            height: 100vh;
            min-height: -webkit-fill-available;
            min-height: 100vh;
            background-color: rgba(0, 0, 0, 0.2);
            z-index: -1;
            /* Same anti-movement techniques */
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        /* Default background color that extends beyond content */
        body {
            /* Default background color while images load - was #bc824f */
            background-color: #000000;
            font-family: 'Nunito', system-ui, -apple-system, sans-serif;
            /* Better touch behavior on iOS */
            -webkit-tap-highlight-color: transparent;
            /* Remove padding-top as it's now in content-container */
            position: relative;
            z-index: 1;
            /* Prevent rubber band scrolling effect on mobile */
            overscroll-behavior-y: none;
        }

        /* Rest of your styles remain the same */
        .text-enhanced {
            font-weight: 600; /* Semi-bold for better contrast without outlines */
        }

        #location-selector {
            height: 36px; /* Increased height for better touch target */

        .min-h-countdown {

        }

        button {

        }

        /* Add these styles to your existing style block */
        .custom-dropdown {
            -webkit-user-select: none;
            user-select: none;
            position: relative;
        }

        .custom-dropdown .selected-display:focus {
            outline: 2px solid #3b82f6;
            outline-offset: 2px;
        }

        /* Smooth transitions for UI updates */
        .transition-smooth {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .fade-update {
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0.5; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Optimize countdown repaints */
        #countdown-hours, #countdown-minutes, #countdown-seconds {
            will-change: contents;
        }

        /* Better tap targets for mobile */
        button, select, a {
            -webkit-tap-highlight-color: rgba(0, 0, 0, 0.1);
        }

        /* Smooth scroll behavior */
        html {
            scroll-behavior: smooth;
        }

        /* Loading skeleton styles */
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Mobile-specific optimizations */
        @media screen and (max-width: 768px) {
            /* Prevent zoom on input focus */
            input, select, textarea {
                font-size: 16px;
            }

            /* Ensure content doesn't jump during scroll */
            .content-container {
                -webkit-overflow-scrolling: touch;
                overflow-anchor: none;
            }

            /* Optimize animations on mobile */
            .transition-smooth {
                transition-duration: 0.2s;
            }
        }

        /* Prevent pull-to-refresh on mobile browsers */
        @media (pointer: coarse) {
            body {
                overscroll-behavior-y: contain;
            }
        }

    <!-- JavaScript -->
    <script>
        // ==================== MOBILE VIEWPORT FIX ====================
        // Fix for Chrome mobile address bar causing background shift
        // Lock the viewport height on initial load
        (function() {
            const setViewportHeight = () => {
                // Get the actual viewport height when page loads
                const vh = window.innerHeight * 0.01;
                // Set as CSS custom property
                document.documentElement.style.setProperty('--vh', `${vh}px`);

                // Lock fixed elements to initial viewport
                const fixedBg = document.querySelector('.fixed-bg');
                const dimmer = document.querySelector('.bg-dimmer');
                if (fixedBg) {
                    fixedBg.style.height = `${window.innerHeight}px`;
                }
                if (dimmer) {
                    dimmer.style.height = `${window.innerHeight}px`;
                }
            };

            // Set on load
            setViewportHeight();

            // Only recalculate on actual resize (orientation change), not address bar hide
            let resizeTimer;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    // Only update if width changed (orientation) not just height (address bar)
                    const currentWidth = window.innerWidth;
                    if (window.lastWidth !== currentWidth) {
                        setViewportHeight();
                        window.lastWidth = currentWidth;
                    }
                }, 250);
            });
            window.lastWidth = window.innerWidth;
        })();

        // Add this near the top of your script section
        const DEBUG = false; // Set to true only when debugging

        // Create a debug-friendly logger function
        function debugLog(...args) {
            if (DEBUG) {
                console.log(...args);
            }
        }

        // ==================== DOM ELEMENT CACHE ====================
        // Cache DOM elements for better performance
        const DOMCache = {
            // Current date/time elements
            currentDate: null,
            currentTime: null,
            locationTimeDisplay: null,

            // Main event elements
            mainEventLabel: null,
            mainEventDate: null,
            mainEventTime: null,

            // Countdown elements
            countdownHours: null,
            countdownMinutes: null,
            countdownSeconds: null,

            // Secondary event elements
            secondaryEventLabel: null,
            secondaryEventDate: null,
            secondaryEventTime: null,

            // Prayer elements
            nextPrayerName: null,
            nextPrayerTime: null,
            followingPrayerName: null,
            followingPrayerTime: null,

            // Other elements
            locationSelector: null,

            // Initialize all cached elements
            init() {
                this.currentDate = document.getElementById('current-date');
                this.currentTime = document.getElementById('current-time');
                this.mainEventLabel = document.getElementById('main-event-label');
                this.mainEventDate = document.getElementById('main-event-date');
                this.mainEventTime = document.getElementById('main-event-time');
                this.countdownHours = document.getElementById('countdown-hours');
                this.countdownMinutes = document.getElementById('countdown-minutes');
                this.countdownSeconds = document.getElementById('countdown-seconds');
                this.secondaryEventLabel = document.getElementById('secondary-event-label');
                this.secondaryEventDate = document.getElementById('secondary-event-date');
                this.secondaryEventTime = document.getElementById('secondary-event-time');
                this.nextPrayerName = document.getElementById('next-prayer-name');
                this.nextPrayerTime = document.getElementById('next-prayer-time');
                this.followingPrayerName = document.getElementById('following-prayer-name');
                this.followingPrayerTime = document.getElementById('following-prayer-time');
                this.locationSelector = document.getElementById('location-selector');
                debugLog('DOM cache initialized');
            }
        }

        // ==================== CENTRALIZED ERROR & CACHE MANAGEMENT ====================
        const AppCache = {
            keys: {
                prayerTimes: 'prayerTimesCache',
                stjohns: 'stjohnsPrayerTimesCache',
                klang: 'klangPrayerTimesCache',
                location: 'selectedLocation'
            },
            set(key, data, ttl = 86400000) { // 24h default TTL
                try {
                    const item = {
                        data: data,
                        timestamp: Date.now(),
                        ttl: ttl
                    };
                    localStorage.setItem(key, JSON.stringify(item));
                    return true;
                } catch (e) {
                    console.warn('Cache write failed:', e);
                    return false;
                }
            },
            get(key) {
                try {
                    const item = JSON.parse(localStorage.getItem(key));
                    if (!item) return null;

                    // Check if expired
                    if (Date.now() - item.timestamp > item.ttl) {
                        this.remove(key);
                        return null;
                    }
                    return item.data;
                } catch (e) {
                    console.warn('Cache read failed:', e);
                    return null;
                }
            },
            remove(key) {
                try {
                    localStorage.removeItem(key);
                } catch (e) {
                    console.warn('Cache remove failed:', e);
                }
            }
        };

        const ErrorHandler = {
            currentError: null,

            show(message, location = null, retryCallback = null) {
                this.hide(); // Remove existing error

                const errorDiv = document.createElement('div');
                errorDiv.id = 'error-display';
                errorDiv.className = 'fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center z-50 p-4';
                errorDiv.style.backdropFilter = 'blur(4px)';

                errorDiv.innerHTML = `
                    <div class="bg-white rounded-lg shadow-2xl max-w-md w-full p-6 transform transition-all">
                        <div class="flex items-start mb-4">
                            <div class="flex-shrink-0">
                                <svg class="h-6 w-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                                </svg>
                            </div>
                            <div class="ml-3 flex-1">
                                <h3 class="text-lg font-semibold text-gray-900 mb-2">Unable to Load Data</h3>
                                <p class="text-sm text-gray-700 mb-1">${message}</p>
                                ${location ? `<p class="text-xs text-gray-500 mt-2">Location: ${location}</p>` : ''}
                                ${!navigator.onLine ? '<p class="text-xs text-orange-600 mt-2 font-medium">⚠️ You appear to be offline</p>' : ''}
                            </div>
                        </div>
                        <div class="flex gap-3 mt-6">
                            ${retryCallback ? `
                                <button id="retry-error" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded flex-1 transition-colors">
                                    <span>Retry</span>
                                </button>
                            ` : ''}
                            <button id="close-error" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-2 px-4 rounded ${retryCallback ? 'flex-1' : 'w-full'} transition-colors">
                                Close
                            </button>
                        </div>
                    </div>
                `;

                document.body.appendChild(errorDiv);
                this.currentError = errorDiv;

                // Event listeners
                document.getElementById('close-error').addEventListener('click', () => this.hide());
                if (retryCallback) {
                    document.getElementById('retry-error').addEventListener('click', () => {
                        this.hide();
                        retryCallback();
                    });
                }

                return errorDiv;
            },

            hide() {
                if (this.currentError) {
                    this.currentError.remove();
                    this.currentError = null;
                }
                const existing = document.getElementById('error-display');
                if (existing) existing.remove();
            },

            getErrorMessage(error, context = 'prayer times') {
                if (!navigator.onLine) {
                    return `No internet connection. Please check your network and try again.`;
                }
                if (error.message === 'Failed to fetch') {
                    return `Network error while loading ${context}. Please check your connection.`;
                }
                if (error.message.includes('404') || error.message.includes('not found')) {
                    return `Data file for ${context} is missing. Please contact support.`;
                }
                if (error.message.includes('Invalid data')) {
                    return `Data format error for ${context}. The file may be corrupted.`;
                }
                if (error.message.includes('today')) {
                    return `Current date not found in ${context} data. Data may be outdated.`;
                }
                return `Failed to load ${context}. ${error.message || 'Unknown error occurred.'}`;
            }
        };

        const LoadingIndicator = {
            element: null,
            showTimeout: null,
            shownAt: null,
            minDisplayTime: 400, // Minimum time to show once displayed (ms)
            showDelay: 200, // Delay before showing to avoid flicker on fast loads (ms)

            show(message = 'Loading...', immediate = false) {
                // Clear any pending show timeout
                if (this.showTimeout) {
                    clearTimeout(this.showTimeout);
                }

                const showIndicator = () => {
                    this._forceHide(); // Clean up any existing indicator first
                    const indicator = document.createElement('div');
                    indicator.id = 'loading-indicator';
                    indicator.className = 'fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-40';
                    indicator.innerHTML = `
                        <div class="bg-white rounded-lg shadow-xl p-6 flex flex-col items-center">
                            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
                            <p class="text-gray-700 font-medium">${message}</p>
                        </div>
                    `;
                    document.body.appendChild(indicator);
                    this.element = indicator;
                    this.shownAt = Date.now(); // Track when we showed it
                    this.showTimeout = null;
                };

                // Immediately show on initial load, delay for subsequent loads
                if (immediate) {
                    showIndicator();
                } else {
                    this.showTimeout = setTimeout(showIndicator, this.showDelay);
                }
            },

            hide() {
                // Clear pending show timeout if hide is called before delay completes
                if (this.showTimeout) {
                    clearTimeout(this.showTimeout);
                    this.showTimeout = null;
                    return;
                }

                // If indicator is showing, ensure minimum display time
                if (this.element && this.shownAt) {
                    const displayTime = Date.now() - this.shownAt;
                    const remainingTime = this.minDisplayTime - displayTime;

                    if (remainingTime > 0) {
                        // Keep showing for the remaining time
                        setTimeout(() => {

        // Replace the parseTime function with this improved version:
        function parseTime(dateString, timeString) {
            try {
                if (!timeString) {
                    console.error("Invalid time string:", timeString);
                    return null;
                }

                // Extract date components
                const dateParts = dateString.split('-');
                const year = parseInt(dateParts[0]);
                const month = parseInt(dateParts[1]) - 1; // JS months are 0-based
                const day = parseInt(dateParts[2]);

                // Handle AM/PM formats consistently
                const upperTimeStr = timeString.toUpperCase();
                const isPM = upperTimeStr.includes('PM');
                const isAM = upperTimeStr.includes('AM');

                // Extract hours and minutes, removing AM/PM
                let timeParts = upperTimeStr.replace(/\s*[AP]M\s*$/i, '').trim().split(':');
                let hours = parseInt(timeParts[0]);
                let minutes = parseInt(timeParts[1] || '0');

                // Adjust hours for 12-hour format
                if (isPM && hours < 12) hours += 12;
                if (isAM && hours === 12) hours = 0;

                // Construct date in user's timezone
                const date = new Date(year, month, day, hours, minutes, 0, 0);

                debugLog(`Parsed "${dateString} ${timeString}" to:`,
                           date.toISOString(), "Hours:", hours, "Minutes:", minutes);

                return date;
            } catch (error) {
                console.error(`Error parsing time "${timeString}" on date "${dateString}":`, error);
                return null;
            }
        }

        // Format date into an English-friendly format
        function formatDate(dateStr) {
            try {
                const options = {
                    day: 'numeric',
                    month: 'long',
                    year: 'numeric'
                };
                const dateObj = new Date(dateStr);
                return dateObj.toLocaleDateString('en-US', options);
            } catch (error) {
                console.error("Error formatting date:", error);
                return dateStr; // Fallback
            }
        }

        // Format time into a consistent 12-hour format
        function formatTime(timeStr) {
            if (!timeStr) return "N/A";

            try {
                let hours, minutes;
                // Check if timeStr already contains AM/PM
                if (/AM|PM/i.test(timeStr)) {
                    return timeStr; // Already in desired format
                }

                [hours, minutes] = timeStr.split(':').map(Number);

                const period = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12 || 12; // Convert to 12-hour format

                return `${hours}:${minutes.toString().padStart(2, '0')} ${period}`;
            } catch (error) {
                console.error("Error formatting time:", error);
                return timeStr; // Return original if there's an error
            }
        }

        function startCountdown(targetTime) {

                    const now = getCurrentLocationTime();
                    const diff = targetTime - now;

                    // Debug information
                    debugLog("Countdown:", {
                        target: targetTime.toISOString(),

                    }

                    // Calculate time components
                    const hours = Math.floor(diff / (1000 * 60 * 60));
                    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                    // Update the DOM
                    DOMCache.countdownHours.textContent = String(hours).padStart(2, '0');

        // Function to match current date to prayer time data
        function findTodaysPrayerData(prayerData) {
            // CHANGE: Use current location time instead of Dhaka time
            const now = getCurrentLocationTime();
            const currentMonth = now.toLocaleString('en-US', { month: 'long' });
            const currentDay = now.getDate();

            debugLog(`Looking for ${currentMonth} ${currentDay}`);

            // Find today's entry
            const todayIndex = prayerData.findIndex(item =>
                item.month === currentMonth && item.day === currentDay
            );

            if (todayIndex >= 0 && todayIndex < prayerData.length - 1) {
                return {
                    today: prayerData[todayIndex],
                    tomorrow: prayerData[todayIndex + 1]
                };
            }

            return null;
        }

        // Function to adjust time based on location offset
        function adjustTimeForLocation(timeString, eventType) {
            if (!locationOffsets || selectedLocation === 'Dhaka' || !timeString) {
                return timeString; // No adjustment needed for Dhaka
            }

            try {
                // Get the offset for the selected location (e.g., "+5 min", "-3 min")
                const offsetType = eventType === 'SEHRI' ? 'Sahri' : 'Iftar';
                const offsetString = locationOffsets[offsetType][selectedLocation];

                if (!offsetString) return timeString; // No offset for this location

                // Parse the offset
                const match = offsetString.match(/([+-])(\d+)\s*min/);
                if (!match) return timeString;

                const sign = match[1] === '+' ? 1 : -1;
                const minutes = parseInt(match[2]) * sign;

                // Parse the time string
                const isAM = timeString.includes('AM');
                const isPM = timeString.includes('PM');
                const timeParts = timeString.replace(/\s*[AP]M\s*$/i, '').trim().split(':');
                let hours = parseInt(timeParts[0]);
                let mins = parseInt(timeParts[1]);

                // Convert to 24-hour format for calculation
                if (isPM && hours < 12) hours += 12;
                if (isAM && hours === 12) hours = 0;

                // Adjust minutes
                let totalMinutes = hours * 60 + mins + minutes;

                // Convert back to hours and minutes
                hours = Math.floor(totalMinutes / 60) % 24;
                mins = totalMinutes % 60;

                // Convert back to 12-hour format
                const period = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12 || 12;

                // Format the time
                return `${hours}:${mins.toString().padStart(2, '0')} ${period}`;
            } catch (error) {
                console.error("Error adjusting time:", error);
                return timeString; // Return original time on error
            }
        }

        // Optimized loadRamadanData function with centralized error handling
        function loadRamadanData() {
            debugLog("Fetching prayer time data...");
            ErrorHandler.hide();
            LoadingIndicator.show('Loading prayer times...');

            // Check for special locations
            if (selectedLocation === "St. John's") {
                return loadStJohnsData();
            } else if (selectedLocation === "Klang") {
                return loadKlangData();
            }

            // For Bangladesh: Try ramadan_curr.json first (priority), then fall back to bangladesh.json
            let isFromRamadanCurr = false;
            return fetch('data/ramadan_curr.json')
                .then(response => {
                    if (!response.ok) {
                        debugLog('ramadan_curr.json not available, trying bangladesh.json');
                        isFromRamadanCurr = false;
                        return fetch('data/bangladesh.json');
                    }
                    isFromRamadanCurr = true;
                    return response;
                })
                .then(response => {
                    if (!response.ok) throw new Error(`HTTP error ${response.status}`);
                    return response.json();
                })
                .then(prayerData => {
                    if (!prayerData || !Array.isArray(prayerData) || prayerData.length === 0) {
                        throw new Error('Invalid data format in prayer times file.');
                    }

                    const matchedData = findTodaysPrayerData(prayerData);
                    if (matchedData) {
                        const data = {
                            items: [matchedData.today, matchedData.tomorrow]
                        };
                        // Only show ±2 min note when NOT using ramadan_curr.json
                        updatePrayerTimes(data, { showNote: !isFromRamadanCurr });
                        AppCache.set(AppCache.keys.prayerTimes, data);
                        LoadingIndicator.hide();
                        return data;
                    } else {
                        throw new Error("Could not find today's prayer data");
                    }
                })
                .catch(error => {
                    console.error('Error loading prayer time data:', error);
                    LoadingIndicator.hide();

                    const cachedData = AppCache.get(AppCache.keys.prayerTimes);
                    if (cachedData) {
                        debugLog('Using cached Bangladesh prayer data');
                        updatePrayerTimes(cachedData, { showNote: true });
                        ErrorHandler.show(
                            'Showing cached data. ' + ErrorHandler.getErrorMessage(error, 'latest prayer times'),
                            selectedLocation,

                        );
                        return cachedData;
                    }

                        () => loadRamadanData()
                    );
                    return Promise.resolve();
                });
        }

        // Update getISOFromItem to work with the new format
        function getISOFromItem(item) {
            try {
                if (!item || !item.month || !item.day) {
                    console.error("Invalid item for date conversion:", item);
                    return "";
                }

                const currentYear = new Date().getFullYear();
                const month = new Date(`${item.month} 1, 2000`).getMonth() + 1; // Get month number (1-12)
                const day = item.day;

                return `${currentYear}-${month.toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
            } catch (error) {
                console.error("Error converting date:", error);
                return "";
            }
        }

            // Prevent pull-to-refresh on mobile
            let touchStartY = 0;
            document.addEventListener('touchstart', (e) => {
                touchStartY = e.touches[0].clientY;
            }, { passive: false });

            document.addEventListener('touchmove', (e) => {
                const touchY = e.touches[0].clientY;
                const touchDelta = touchY - touchStartY;

                // If at top of page and pulling down, prevent default
                if (window.scrollY === 0 && touchDelta > 0) {
                    e.preventDefault();
                }
            }, { passive: false });

            // Prevent double-tap zoom on buttons
            let lastTouchEnd = 0;
            document.addEventListener('touchend', (e) => {
                const now = Date.now();
                if (now - lastTouchEnd <= 300) {
                    e.preventDefault();
                }
                lastTouchEnd = now;
            }, { passive: false });

            // Show loading indicator immediately on initial page load
            LoadingIndicator.show('Loading prayer times...', true);

            // Initialize the app
            init().then(() => {
                LoadingIndicator.hide();

                // Check if St. John's is already selected (from localStorage)

                    timeZone = 'Asia/Kuala_Lumpur'; // Malaysia timezone

                    timeZone = 'Asia/Dhaka';        // Default Bangladesh timezone

                return new Date(new Date().toLocaleString('en-US', { timeZone: timeZone }));

                console.error(`Error getting time for ${selectedLocation}:`, error);

        }
